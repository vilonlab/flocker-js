<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connected Clients - Flocker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .header .subtitle {
            font-size: 16px;
            opacity: 0.9;
        }

        .header .meta {
            font-size: 14px;
            opacity: 0.8;
            margin-top: 10px;
        }

        .controls {
            text-align: center;
            margin-bottom: 20px;
        }

        .refresh-btn {
            background: white;
            color: #667eea;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: all 0.3s;
        }

        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
        }

        .refresh-btn:active {
            transform: translateY(0);
        }

        .clients-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .client-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .client-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        }

        .client-header {
            padding: 16px;
            color: white;
            font-weight: 600;
            font-size: 18px;
            text-align: center;
        }

        .client-body {
            padding: 16px;
        }

        .client-data-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .client-data-row:last-child {
            border-bottom: none;
        }

        .client-data-label {
            font-weight: 600;
            color: #555;
            font-size: 14px;
        }

        .client-data-value {
            color: #333;
            font-size: 14px;
            text-align: right;
            word-break: break-word;
        }

        .color-preview {
            display: inline-block;
            width: 20px;
            height: 20px;
            border-radius: 4px;
            border: 1px solid #ddd;
            vertical-align: middle;
            margin-left: 8px;
        }

        .no-clients {
            text-align: center;
            color: white;
            font-size: 18px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            max-width: 500px;
            margin: 0 auto;
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 18px;
            padding: 40px;
        }

        .error {
            text-align: center;
            color: #ff6b6b;
            font-size: 16px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            max-width: 500px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Connected Clients</h1>
        <div class="subtitle">Real-time client data from the most recent snapshot</div>
        <div class="meta" id="metaInfo"></div>
    </div>

    <div class="controls">
        <button class="refresh-btn" onclick="fetchClients()">Refresh Data</button>
    </div>

    <div id="clientsContainer" class="loading">Loading client data...</div>

    <script>
        let autoRefreshInterval = null;

        async function fetchClients() {
            const container = document.getElementById('clientsContainer');
            const metaInfo = document.getElementById('metaInfo');

            try {
                const response = await fetch('/app/admin/api/clients/current');

                if (!response.ok) {
                    throw new Error('Failed to fetch client data');
                }

                const data = await response.json();

                // Update meta information
                if (data.timestamp !== undefined) {
                    const date = new Date(data.timestamp);
                    metaInfo.textContent = `Room: ${data.roomId} | Last updated: ${date.toLocaleString()}`;
                }

                // Clear container
                container.innerHTML = '';
                container.className = '';

                if (!data.clients || data.clients.length === 0) {
                    container.className = 'no-clients';
                    container.innerHTML = '<p>No clients currently connected</p>';
                    return;
                }

                // Create container for cards
                container.className = 'clients-container';

                // Create a card for each client
                data.clients.forEach((client, index) => {
                    const card = createClientCard(client, index);
                    container.appendChild(card);
                });

            } catch (error) {
                console.error('Error fetching clients:', error);
                container.innerHTML = '<div class="error">Failed to load client data. Please try again.</div>';
            }
        }

        function createClientCard(client, index) {
            const card = document.createElement('div');
            card.className = 'client-card';

            // Create header with client name and background color
            const header = document.createElement('div');
            header.className = 'client-header';
            header.style.backgroundColor = client.color || '#667eea';
            header.style.color = client.textcolor || '#FFFFFF';
            header.textContent = client.name || `Client ${index + 1}`;
            card.appendChild(header);

            // Create body with client data
            const body = document.createElement('div');
            body.className = 'client-body';

            // Add data rows
            const dataFields = [
                { label: 'Position X', value: client.x !== undefined ? client.x.toFixed(2) : 'N/A' },
                { label: 'Position Y', value: client.y !== undefined ? client.y.toFixed(2) : 'N/A' },
                { label: 'Color', value: client.color || 'N/A', isColor: true },
                { label: 'Points', value: client.points !== undefined ? client.points : 'N/A' },
                { label: 'Emote', value: client.emote || '(none)' },
                { label: 'Zone', value: client.zone !== undefined ? (client.zone === -1 ? 'None' : client.zone) : 'N/A' },
                { label: 'Aware', value: client.aware !== undefined ? (client.aware ? 'Yes' : 'No') : 'N/A' },
                { label: 'Ready', value: client.ready !== undefined ? (client.ready ? 'Yes' : 'No') : 'N/A' }
            ];

            dataFields.forEach(field => {
                const row = document.createElement('div');
                row.className = 'client-data-row';

                const label = document.createElement('span');
                label.className = 'client-data-label';
                label.textContent = field.label;

                const value = document.createElement('span');
                value.className = 'client-data-value';
                value.textContent = field.value;

                // Add color preview if it's a color field
                if (field.isColor && field.value !== 'N/A') {
                    const colorPreview = document.createElement('span');
                    colorPreview.className = 'color-preview';
                    colorPreview.style.backgroundColor = field.value;
                    value.appendChild(colorPreview);
                }

                row.appendChild(label);
                row.appendChild(value);
                body.appendChild(row);
            });

            card.appendChild(body);
            return card;
        }

        // Initial fetch
        fetchClients();

        // Auto-refresh every 2 seconds
        autoRefreshInterval = setInterval(fetchClients, 2000);
    </script>
</body>
</html>
