<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Extraction - Flocker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #555;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            position: relative;
        }

        input[type="radio"] {
            appearance: none;
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border: 2px solid #e0e0e0;
            border-radius: 50%;
            margin-right: 12px;
            cursor: pointer;
            transition: all 0.3s;
            flex-shrink: 0;
        }

        input[type="radio"]:hover {
            border-color: #667eea;
        }

        input[type="radio"]:checked {
            border-color: #667eea;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        input[type="radio"]:checked::before {
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            top: 50%;
            left: 6px;
            transform: translateY(-50%);
        }

        .radio-label {
            font-weight: 400;
            color: #555;
            font-size: 14px;
            cursor: pointer;
            user-select: none;
        }

        input[type="radio"]:checked + .radio-label {
            color: #333;
            font-weight: 500;
        }

        input[type="date"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="date"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #666;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .info-box {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-top: 20px;
            border-radius: 4px;
            font-size: 13px;
            color: #555;
        }

        .info-box strong {
            color: #333;
        }

        .error {
            background: #fee;
            border-left-color: #e53e3e;
            color: #c53030;
        }

        .success {
            background: #efe;
            border-left-color: #38a169;
            color: #276749;
        }

        #message {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Data Extraction</h1>
        <p class="subtitle">Export snapshot data by date range</p>

        <form id="extractForm">
            <div class="form-group">
                <label for="startDate">Start Date</label>
                <input type="date" id="startDate" name="startDate" required>
            </div>

            <div class="form-group">
                <label for="endDate">End Date</label>
                <input type="date" id="endDate" name="endDate" required>
            </div>

            <div class="form-group">
                <label>Data Type</label>
                <div class="radio-group">
                    <div class="radio-option">
                        <input type="radio" id="state" name="dataType" value="STATE" checked>
                        <label class="radio-label" for="state">State</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="player" name="dataType" value="PLAYER">
                        <label class="radio-label" for="player">Player</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="full" name="dataType" value="FULL">
                        <label class="radio-label" for="full">Full</label>
                    </div>
                </div>
            </div>

            <div class="button-group">
                <button type="submit" class="btn-primary">Download CSV</button>
                <button type="button" class="btn-secondary" onclick="clearForm()">Clear</button>
            </div>
        </form>

        <div id="message" class="info-box"></div>

        <div class="info-box">
            <strong>Note:</strong> The exported CSV will contain all snapshot records within the selected date range, including player positions, game phases, and round information.
        </div>
    </div>

    <script>
        const form = document.getElementById('extractForm');
        const messageBox = document.getElementById('message');

        // Set default dates (today and 7 days ago)
        const today = new Date();
        const sevenDaysAgo = new Date(today);
        sevenDaysAgo.setDate(today.getDate() - 7);

        document.getElementById('endDate').valueAsDate = today;
        document.getElementById('startDate').valueAsDate = sevenDaysAgo;

        // helper to read selected radio value
        function getSelectedDataType() {
            const el = document.querySelector('input[name="dataType"]:checked');
            return el ? el.value : '';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            const dataType = getSelectedDataType();

            // Validate dates
            if (new Date(startDate) > new Date(endDate)) {
                showMessage('Start date must be before end date', 'error');
                return;
            }

            try {
                showMessage('Generating CSV...', 'info');

                // Build URL with query parameters
                const url = `/api/data?dataType=${dataType}&startDate=${startDate}&endDate=${endDate}`;

                // Fetch the CSV
                const response = await fetch(url);

                if (!response.ok) {
                    throw new Error('Failed to fetch data');
                }

                // Get the CSV blob
                const blob = await response.blob();

                // Create download link
                const downloadUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = downloadUrl;
                a.download = `snapshots-${startDate}_to_${endDate}.csv`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(downloadUrl);

                showMessage('CSV downloaded successfully!', 'success');
            } catch (error) {
                console.error('Error:', error);
                showMessage('Failed to download data. Please try again.', 'error');
            }
        });

        function showMessage(text, type) {
            messageBox.textContent = text;
            messageBox.className = 'info-box ' + type;
            messageBox.style.display = 'block';

            if (type === 'success') {
                setTimeout(() => {
                    messageBox.style.display = 'none';
                }, 3000);
            }
        }

        function clearForm() {
            const today = new Date();
            const sevenDaysAgo = new Date(today);
            sevenDaysAgo.setDate(today.getDate() - 7);

            document.getElementById('endDate').valueAsDate = today;
            document.getElementById('startDate').valueAsDate = sevenDaysAgo;
            messageBox.style.display = 'none';
        }
    </script>
</body>
</html>
