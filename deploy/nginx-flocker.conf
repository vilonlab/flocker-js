# Reference nginx config for flocker. Add these two `location` blocks inside
# the existing `server { ... }` block for gusb.xyz (the one already handling
# TLS) and reload nginx (`sudo nginx -t && sudo systemctl reload nginx`).
#
# Everything for this app lives under /flocker/: static client assets at
# /flocker/, backend (WS + admin/API) at /flocker/app/. nginx picks the
# longest matching prefix for plain `location` blocks, so /flocker/app/
# wins over /flocker/ regardless of the order they appear in here.

location /flocker/app/ {
	proxy_pass http://127.0.0.1:2567/;
	proxy_http_version 1.1;
	proxy_set_header Upgrade $http_upgrade;
	proxy_set_header Connection "upgrade";
	proxy_set_header Host $host;
	proxy_set_header X-Real-IP $remote_addr;
	proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
	proxy_set_header X-Forwarded-Proto $scheme;
	proxy_read_timeout 86400;
}

location /flocker/ {
	alias /var/www/flocker/;
	try_files $uri $uri/ /flocker/index.html;
}
