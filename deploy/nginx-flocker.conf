# Reference nginx config for flocker. Add these `location` blocks inside
# the existing `server { ... }` block for gusb.xyz (the one already handling
# TLS) and reload nginx (`sudo nginx -t && sudo systemctl reload nginx`).
#
# Requires nginx's ngx_http_auth_request_module (bundled by default in most
# distro nginx packages; check with `nginx -V 2>&1 | grep -o with-http_auth_request_module`).
#
# Everything for this app lives under /flocker/: static client assets at
# /flocker/, game backend (WS/matchmake/api) at /flocker/app/, admin pages
# at /flocker/admin/. nginx picks the longest matching prefix for plain
# `location` blocks, so these don't conflict regardless of order here.
#
# /flocker/admin/ is gated behind oauth2-proxy (GitHub SSO, allow-listed by
# username) via nginx's auth_request. oauth2-proxy itself listens on
# 127.0.0.1:4180 and is only ever reached through nginx. The old
# /flocker/app/admin/ path is explicitly blocked so it can't be used as an
# unauthenticated bypass around the gate (the general /flocker/app/ location
# below would otherwise proxy it straight through, ungated).

location = /flocker {
	return 301 /flocker/;
}

# --- oauth2-proxy's own endpoints (login flow, callback, auth check) ---
location /oauth2/ {
	proxy_pass       http://127.0.0.1:4180;
	proxy_set_header Host             $host;
	proxy_set_header X-Real-IP        $remote_addr;
	proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
	proxy_set_header X-Forwarded-Proto $scheme;
	proxy_set_header X-Auth-Request-Redirect $request_uri;
}

location = /oauth2/auth {
	proxy_pass       http://127.0.0.1:4180;
	proxy_set_header Host             $host;
	proxy_set_header X-Real-IP        $remote_addr;
	proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
	proxy_set_header X-Forwarded-Proto $scheme;
	proxy_set_header Content-Length   "";
	proxy_pass_request_body off;
}

# --- gated admin area: auth_request must pass before proxying to colyseus ---
location /flocker/admin/ {
	auth_request /oauth2/auth;
	error_page 401 = /oauth2/sign_in;

	auth_request_set $auth_user  $upstream_http_x_auth_request_user;
	auth_request_set $auth_email $upstream_http_x_auth_request_email;
	proxy_set_header X-User  $auth_user;
	proxy_set_header X-Email $auth_email;

	proxy_pass http://127.0.0.1:2567/admin/;
	proxy_http_version 1.1;
	proxy_set_header Host $host;
	proxy_set_header X-Real-IP $remote_addr;
	proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
	proxy_set_header X-Forwarded-Proto $scheme;
}

# --- block the old path so admin isn't reachable ungated via /flocker/app/ ---
location /flocker/app/admin/ {
	return 404;
}

# --- everything else under /flocker/app/ (WS game connection, matchmake, api/client-id) stays public ---
location /flocker/app/ {
	proxy_pass http://127.0.0.1:2567/;
	proxy_http_version 1.1;
	proxy_set_header Upgrade $http_upgrade;
	proxy_set_header Connection "upgrade";
	proxy_set_header Host $host;
	proxy_set_header X-Real-IP $remote_addr;
	proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
	proxy_set_header X-Forwarded-Proto $scheme;
	proxy_read_timeout 86400;
}

location /flocker/ {
	alias /var/www/flocker/;
	try_files $uri $uri/ /flocker/index.html;
}
